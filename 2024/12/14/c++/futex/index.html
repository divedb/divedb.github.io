    <div class="post-body" itemprop="articleBody"><h2 id="futex"><a href="#futex" class="headerlink" title="futex"></a>futex</h2><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// Following the &quot;mutex2&quot; implementation in Drepper&#x27;s &quot;Futexes Are Tricky&quot;</span></span><br><span class="line"><span class="comment">// Note: this version works for threads, not between processes.</span></span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="comment">// Eli Bendersky [http://eli.thegreenplace.net]</span></span><br><span class="line"><span class="comment">// This code is in the public domain.</span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;atomic&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;cstdint&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;linux/futex.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;pthread.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;sstream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;sys/resource.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;sys/shm.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;sys/syscall.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;thread&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;unistd.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="comment">// An atomic_compare_exchange wrapper with semantics expected by the paper&#x27;s</span></span><br><span class="line"><span class="comment">// mutex - return the old value stored in the atom.</span></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">cmpxchg</span><span class="params">(std::atomic&lt;<span class="type">int</span>&gt; *atom, <span class="type">int</span> expected, <span class="type">int</span> desired)</span> </span>&#123;</span><br><span class="line">  <span class="type">int</span> *ep = &amp;expected;</span><br><span class="line">  std::<span class="built_in">atomic_compare_exchange_strong</span>(atom, ep, desired);</span><br><span class="line">  <span class="keyword">return</span> *ep;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Mutex</span> &#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">  <span class="built_in">Mutex</span>() : <span class="built_in">atom_</span>(<span class="number">0</span>) &#123;&#125;</span><br><span class="line"></span><br><span class="line">  <span class="function"><span class="type">void</span> <span class="title">lock</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="type">int</span> c = <span class="built_in">cmpxchg</span>(&amp;atom_, <span class="number">0</span>, <span class="number">1</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// If the lock was previously unlocked, there&#x27;s nothing else for us to do.</span></span><br><span class="line">    <span class="comment">// Otherwise, we&#x27;ll probably have to wait.</span></span><br><span class="line">    <span class="keyword">if</span> (c != <span class="number">0</span>) &#123;</span><br><span class="line">      <span class="keyword">do</span> &#123;</span><br><span class="line">        <span class="comment">// If the mutex is locked, we signal that we&#x27;re waiting by setting the</span></span><br><span class="line">        <span class="comment">// atom to 2. A shortcut checks is it&#x27;s 2 already and avoids the atomic</span></span><br><span class="line">        <span class="comment">// operation in this case.</span></span><br><span class="line">        <span class="keyword">if</span> (c == <span class="number">2</span> || <span class="built_in">cmpxchg</span>(&amp;atom_, <span class="number">1</span>, <span class="number">2</span>) != <span class="number">0</span>) &#123;</span><br><span class="line">          <span class="comment">// Here we have to actually sleep, because the mutex is actually</span></span><br><span class="line">          <span class="comment">// locked. Note that it&#x27;s not necessary to loop around this syscall;</span></span><br><span class="line">          <span class="comment">// a spurious wakeup will do no harm since we only exit the do...while</span></span><br><span class="line">          <span class="comment">// loop when atom_ is indeed 0.</span></span><br><span class="line">          <span class="built_in">syscall</span>(SYS_futex, (<span class="type">int</span> *)&amp;atom_, FUTEX_WAIT, <span class="number">2</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="comment">// We&#x27;re here when either:</span></span><br><span class="line">        <span class="comment">// (a) the mutex was in fact unlocked (by an intervening thread).</span></span><br><span class="line">        <span class="comment">// (b) we slept waiting for the atom and were awoken.</span></span><br><span class="line">        <span class="comment">//</span></span><br><span class="line">        <span class="comment">// So we try to lock the atom again. We set the state to 2 because we</span></span><br><span class="line">        <span class="comment">// can&#x27;t be certain there&#x27;s no other thread at this exact point. So we</span></span><br><span class="line">        <span class="comment">// prefer to err on the safe side.</span></span><br><span class="line">      &#125; <span class="keyword">while</span> ((c = <span class="built_in">cmpxchg</span>(&amp;atom_, <span class="number">0</span>, <span class="number">2</span>)) != <span class="number">0</span>);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="function"><span class="type">void</span> <span class="title">unlock</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (atom_.<span class="built_in">fetch_sub</span>(<span class="number">1</span>) != <span class="number">1</span>) &#123;</span><br><span class="line">      atom_.<span class="built_in">store</span>(<span class="number">0</span>);</span><br><span class="line">      <span class="built_in">syscall</span>(SYS_futex, (<span class="type">int</span> *)&amp;atom_, FUTEX_WAKE, <span class="number">1</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">private</span>:</span><br><span class="line">  std::atomic&lt;<span class="type">int</span>&gt; atom_;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">// Simple function that increments the value pointed to by n, 10 million times.</span></span><br><span class="line"><span class="comment">// If m is not nullptr, it&#x27;s a Mutex that will be used to protect the increment</span></span><br><span class="line"><span class="comment">// operation.</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">threadfunc</span><span class="params">(<span class="type">int64_t</span> *n, Mutex *m = <span class="literal">nullptr</span>)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; <span class="number">10000000</span>; ++i) &#123;</span><br><span class="line">    <span class="keyword">if</span> (m != <span class="literal">nullptr</span>) &#123;</span><br><span class="line">      m-&gt;<span class="built_in">lock</span>();</span><br><span class="line">    &#125;</span><br><span class="line">    *n += <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">if</span> (m != <span class="literal">nullptr</span>) &#123;</span><br><span class="line">      m-&gt;<span class="built_in">unlock</span>();</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">(<span class="type">int</span> argc, <span class="type">char</span> **argv)</span> </span>&#123;</span><br><span class="line">  &#123;</span><br><span class="line">    <span class="type">int64_t</span> vnoprotect = <span class="number">0</span>;</span><br><span class="line">    <span class="function">std::thread <span class="title">t1</span><span class="params">(threadfunc, &amp;vnoprotect, <span class="literal">nullptr</span>)</span></span>;</span><br><span class="line">    <span class="function">std::thread <span class="title">t2</span><span class="params">(threadfunc, &amp;vnoprotect, <span class="literal">nullptr</span>)</span></span>;</span><br><span class="line">    <span class="function">std::thread <span class="title">t3</span><span class="params">(threadfunc, &amp;vnoprotect, <span class="literal">nullptr</span>)</span></span>;</span><br><span class="line"></span><br><span class="line">    t<span class="number">1.</span><span class="built_in">join</span>();</span><br><span class="line">    t<span class="number">2.</span><span class="built_in">join</span>();</span><br><span class="line">    t<span class="number">3.</span><span class="built_in">join</span>();</span><br><span class="line"></span><br><span class="line">    std::cout &lt;&lt; <span class="string">&quot;vnoprotect = &quot;</span> &lt;&lt; vnoprotect &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  &#123;</span><br><span class="line">    <span class="type">int64_t</span> v = <span class="number">0</span>;</span><br><span class="line">    Mutex m;</span><br><span class="line"></span><br><span class="line">    <span class="function">std::thread <span class="title">t1</span><span class="params">(threadfunc, &amp;v, &amp;m)</span></span>;</span><br><span class="line">    <span class="function">std::thread <span class="title">t2</span><span class="params">(threadfunc, &amp;v, &amp;m)</span></span>;</span><br><span class="line">    <span class="function">std::thread <span class="title">t3</span><span class="params">(threadfunc, &amp;v, &amp;m)</span></span>;</span><br><span class="line"></span><br><span class="line">    t<span class="number">1.</span><span class="built_in">join</span>();</span><br><span class="line">    t<span class="number">2.</span><span class="built_in">join</span>();</span><br><span class="line">    t<span class="number">3.</span><span class="built_in">join</span>();</span><br><span class="line"></span><br><span class="line">    std::cout &lt;&lt; <span class="string">&quot;v = &quot;</span> &lt;&lt; v &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
