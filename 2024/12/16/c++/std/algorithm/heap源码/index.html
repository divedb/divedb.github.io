ord">typedef</span> <span class="keyword">typename</span> iterator_traits&lt;_RandomAccessIterator&gt;::value_type value_type;</span><br><span class="line">  <span class="comment">// left-child of __start is at 2 * __start + 1</span></span><br><span class="line">  <span class="comment">// right-child of __start is at 2 * __start + 2</span></span><br><span class="line">  difference_type __child = __start - __first;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> (__len &lt; <span class="number">2</span> || (__len - <span class="number">2</span>) / <span class="number">2</span> &lt; __child)</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line"></span><br><span class="line">  __child                         = <span class="number">2</span> * __child + <span class="number">1</span>;</span><br><span class="line">  _RandomAccessIterator __child_i = __first + __child;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> ((__child + <span class="number">1</span>) &lt; __len &amp;&amp; __comp(*__child_i, *(__child_i + <span class="built_in">difference_type</span>(<span class="number">1</span>)))) &#123;</span><br><span class="line">    <span class="comment">// right-child exists and is greater than left-child</span></span><br><span class="line">    ++__child_i;</span><br><span class="line">    ++__child;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// check if we are in heap-order</span></span><br><span class="line">  <span class="keyword">if</span> (__comp(*__child_i, *__start))</span><br><span class="line">    <span class="comment">// we are, __start is larger than its largest child</span></span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line"></span><br><span class="line">  value_type __top(_Ops::__iter_move(__start));</span><
